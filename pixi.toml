[workspace]
name = "rendercv"
version = "2.8"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12,<3.15"

[pypi-dependencies]
rendercv = { path = ".", extras = ["full"], editable = true }

[tasks]
render = "rendercv render"
new = "rendercv new"
create-theme = "rendercv create-theme"
