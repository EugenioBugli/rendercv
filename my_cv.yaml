design:
  theme: moderncv
  typography:
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
  colors:
    name: rgb(0, 100, 50)
    headline: rgb(0, 100, 50)
    connections: rgb(0, 100, 50)
    section_titles: rgb(0, 100, 50)
    links: rgb(0, 100, 50)
  section_titles:
    space_above: 0.8cm
  sections:
    show_time_spans_in: []
  templates:
    education_entry:
      degree_column: null
      main_column: |-
        **DEGREE_WITH_AREA**
        INSTITUTION
        SUMMARY
        HIGHLIGHTS
    experience_entry:
      main_column: |-
        **POSITION**
        COMPANY
        SUMMARY
        HIGHLIGHTS
        EVENTS
    publication_entry:
      main_column: |-
        NUMBER **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)

